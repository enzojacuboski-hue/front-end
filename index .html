<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Moderno Single-File</title>
    <style>
        /* Estilização Centralizada */
        :root {
            --primary-color: #6c5ce7;
            --bg-dark: #1a1a2e;
            --card-bg: #16213e;
            --text-color: #ffffff;
            --input-bg: #0f3460;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 {
            margin-bottom: 1.5rem;
            font-weight: 500;
            text-align: center;
            letter-spacing: 1px;
        }

        .field {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #a2a2a2;
        }

        input {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 8px;
            color: white;
            box-sizing: border-box; /* Garante que o padding não quebre a largura */
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: #1b497e;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            background: #5b4bc4;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #777;
        }

        .footer-text a {
            color: var(--primary-color);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Entrar no Sistema</h2>
        <form>
            <div class="field">
                <label for="user">Usuário</label>
                <input type="text" id="user" placeholder="Seu nome de usuário" required>
            </div>

            <div class="field">
                <label for="pass">Senha</label>
                <input type="password" id="pass" placeholder="••••••••" required>
            </div>

            <button type="submit">Acessar Painel</button>
        </form>
        
        <p class="footer-text">Não tem uma conta? <a href="#">Cadastre-se</a></p>
    </div>

</body>
</html>
